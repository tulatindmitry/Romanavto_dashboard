function b642bytes(b){const s=atob(b);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function decrypt(pw){
  const data=b642bytes(PAYLOAD);
  const salt=data.slice(0,16), iv=data.slice(16,28), ct=data.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'); err.textContent='';
  try{
    const html=await decrypt(pw);
    document.open(); document.write(html); document.close();
  }catch(e){ err.textContent='Неверный пароль'; }
}
document.getElementById('go').onclick=go;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
